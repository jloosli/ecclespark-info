name: Angular Preview Deploy

on:
  pull_request:
    branches: [main]

jobs:
  build-and-preview:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install Angular dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Functions dependencies
        run: cd functions && npm ci

      - name: Run Functions tests
        run: cd functions && npm test

      - name: Run unit tests
        run: npm test

      - name: Build Angular app
        env:
          NG_FIREBASE_API_KEY: ${{ secrets.NG_FIREBASE_API_KEY }}
          NG_FIREBASE_AUTH_DOMAIN: ${{ secrets.NG_FIREBASE_AUTH_DOMAIN }}
          NG_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NG_FIREBASE_MESSAGING_SENDER_ID }}
          NG_FIREBASE_APP_ID: ${{ secrets.NG_FIREBASE_APP_ID }}
        run: npm run build:prod

      - name: Deploy to Firebase Hosting (Preview)
        id: firebase-deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ECCLESPARK_INFO }}
          projectId: ecclespark-info

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npx playwright test
        env:
          BASE_URL: ${{ steps.firebase-deploy.outputs.details_url }}
