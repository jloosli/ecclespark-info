name: Angular Preview Deploy

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

jobs:
  build-and-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID: ecclespark-info

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install Angular dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Functions dependencies
        run: cd functions && npm ci

      - name: Run Functions tests
        run: cd functions && npm test

      - name: Run unit tests
        run: npm test

      - name: Build Angular app
        if: github.actor != 'dependabot[bot]'
        env:
          NG_FIREBASE_API_KEY: ${{ secrets.NG_FIREBASE_API_KEY }}
          NG_FIREBASE_AUTH_DOMAIN: ${{ secrets.NG_FIREBASE_AUTH_DOMAIN }}
          NG_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NG_FIREBASE_MESSAGING_SENDER_ID }}
          NG_FIREBASE_APP_ID: ${{ secrets.NG_FIREBASE_APP_ID }}
        run: npm run build:prod

      - name: Deploy to Firebase Hosting (Preview)
        if: github.actor != 'dependabot[bot]'
        id: firebase-deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ECCLESPARK_INFO }}
          projectId: ${{ env.FIREBASE_PROJECT_ID }}

      - name: Add preview domain to Firebase Auth
        if: github.actor != 'dependabot[bot]' && steps.firebase-deploy.outputs.details_url
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ECCLESPARK_INFO }}
          FIREBASE_PROJECT_ID: ecclespark-info
        run: |
          PREVIEW_URL="${{ steps.firebase-deploy.outputs.details_url }}"
          PREVIEW_DOMAIN=$(echo "$PREVIEW_URL" | sed 's|https\?://||' | sed 's|/.*||')
          echo "Adding authorized domain: $PREVIEW_DOMAIN"
          node scripts/manage-firebase-auth-domain.js add "$PREVIEW_DOMAIN"

      - name: Install Playwright browsers
        if: github.actor != 'dependabot[bot]'
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        if: github.actor != 'dependabot[bot]'
        run: npx playwright test
        env:
          BASE_URL: ${{ steps.firebase-deploy.outputs.details_url }}

  cleanup-auth-domain:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID: ecclespark-info

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Remove preview domain from Firebase Auth
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ECCLESPARK_INFO }}
          FIREBASE_PROJECT_ID: ecclespark-info
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          echo "Removing authorized domains matching: ${FIREBASE_PROJECT_ID}--pr${PR_NUMBER}-"
          node scripts/manage-firebase-auth-domain.js remove-pattern "${FIREBASE_PROJECT_ID}--pr${PR_NUMBER}-"
