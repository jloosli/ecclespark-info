@if (announcements().length > 0) {
  <section class="mb-8">
    <h2 class="text-2xl font-bold text-slate-800 dark:text-slate-100 mb-4">Announcements</h2>
    @for (announcement of announcements(); track announcement.id) {
      <div class="border-l-4 border-accent bg-blue-50 dark:bg-slate-800/60 rounded-r-lg p-4 mb-3 text-sm text-slate-700 dark:text-slate-300 [&_a]:text-accent [&_a]:underline [&_p]:mb-2 [&_ul]:list-disc [&_ul]:pl-4 [&_ol]:list-decimal [&_ol]:pl-4 [&_strong]:font-semibold">
        <div [innerHTML]="announcement.markdown_text | markdown"></div>
      </div>
    }
  </section>
}
